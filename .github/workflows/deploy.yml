name: Deploy to Production

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup SSH
      uses: webfactory/ssh-agent@v0.8.0
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
        
    - name: Add host to known hosts
      run: |
        mkdir -p ~/.ssh
        ssh-keyscan -H 157.245.116.140 >> ~/.ssh/known_hosts
        
    - name: Ensure env vars on Droplet
      run: |
        ssh root@157.245.116.140 '
          grep -q "MANYCHAT_CALLBACK_URL" /root/prismaalalegal/.env || \
            echo "MANYCHAT_CALLBACK_URL=https://alalegal.proyectoprisma.com/api/webhooks/manychat/conversation" >> /root/prismaalalegal/.env
        '

    - name: Deploy to Droplet
      run: |
        ssh root@157.245.116.140 '
          cd /root/prismaalalegal
          git fetch origin
          git reset --hard origin/${{ github.ref_name }}
          docker compose build --no-cache web
          docker compose build manychat-bridge
          docker compose up -d web manychat-bridge openclaw
          docker system prune -f
        '
        
    - name: Verify deployment
      run: |
        echo "Waiting for container to be ready..."
        for i in $(seq 1 18); do
          if curl -sf https://alalegal.proyectoprisma.com/health -o /dev/null; then
            echo "Health check passed on attempt $i"
            exit 0
          fi
          echo "Attempt $i/18 - not ready yet, waiting 10s..."
          sleep 10
        done
        echo "Health check failed after 3 minutes"
        exit 1
